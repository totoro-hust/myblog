<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>我的个人博客</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      line-height: 1.6;
      max-width: 800px;
      margin: 0 auto;
      padding: 2rem;
      background: #fff;
      color: #333;
    }
    header { text-align: center; margin-bottom: 2rem; }
    h1 { color: #2c3e50; }
    .post {
      border-bottom: 1px solid #eee;
      padding: 1.5rem 0;
    }
    .post:last-child { border-bottom: none; }
    img {
      max-width: 100%;
      height: auto;
      border-radius: 8px;
      margin: 1rem 0;
    }
  </style>
</head>
<body>
  <header>
    <h1>✨ 我的个人博客</h1>
    <p>记录思考，分享生活</p>
  </header>

  <div class="post">
    <h2>欢迎来到我的博客！</h2>
    <p>这是我在 Vercel 上搭建的静态博客</p>
    
    <!-- 插入一张本地图片（可选） -->
    <!-- <img src="photo.jpg" alt="示例图"> -->

    <small>发布于 2026年7月6日</small>
  </div>

  <div class="post">
    <h2>如何更新内容？</h2>
    <p>只需修改这个 HTML 文件，推送到 GitHub，Vercel 会自动重新部署！</p>
  </div>
</body>
</html>
